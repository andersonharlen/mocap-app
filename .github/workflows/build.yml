      - name: Montar Projeto e Injetar IA
        run: |
          # Extrai o seu projeto pelo nome exato
          unzip inse-prototipo.zip -d projeto
          PROJECT_DIR=$(dirname $(find projeto -name "project.godot" | head -n 1))
          
          # Baixa a IA do MediaPipe
          wget https://github.com/j20001970/GDMP/releases/download/v0.6.0/gdmp-v0.6.0-android.zip -O plugin.zip
          unzip plugin.zip -d temp_plugin
          mkdir -p $PROJECT_DIR/addons
          cp -r temp_plugin/addons/* $PROJECT_DIR/addons/
          
          # Compila o projeto
          cd $PROJECT_DIR
          mkdir -p export_build
          xvfb-run godot --headless --rendering-driver opengl3 --editor --quit || true
          xvfb-run godot --headless --rendering-driver opengl3 --export-debug "Android" export_build/mocap.apk
