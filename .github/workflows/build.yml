name: Compilar Godot APK com IA Externa
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Baixar o seu código
        uses: actions/checkout@v4
      
      - name: Preparar Java (Para Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Instalar Dependências Virtuais
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers libvulkan1 xvfb libgles2 libegl1 libgl1 libglx-mesa0
          
      - name: Criar Chave Android
        run: |
          mkdir -p /home/runner/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore /home/runner/.android/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12
          
      - name: Instalar Godot 4.4
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
          unzip Godot_v4.4-stable_linux.x86_64.zip
          sudo mv Godot_v4.4-stable_linux.x86_64 /usr/local/bin/godot
          
      - name: Instalar Templates de Exportação
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz
          mkdir -p /home/runner/.local/share/godot/export_templates/4.4.stable/
          unzip Godot_v4.4-stable_export_templates.tpz -d temp/
          mv temp/templates/* /home/runner/.local/share/godot/export_templates/4.4.stable/
          
      - name: Montar Projeto, Curar Erros e Injetar IA
        run: |
          unzip inse-prototipo.zip -d projeto
          PROJECT_DIR=$(dirname $(find projeto -name "project.godot" | head -n 1))
          
          rm -rf $PROJECT_DIR/.godot
          
          # 1. CIRURGIA NO PROJECT.GODOT: Ligar a Cena Principal e o Plugin da IA
          echo "Curando arquivo de projeto principal..."
          awk '/^\[autoload\]/{flag=1; next} /^\[/{flag=0} !flag' $PROJECT_DIR/project.godot > $PROJECT_DIR/temp.godot
          mv $PROJECT_DIR/temp.godot $PROJECT_DIR/project.godot
          
          echo "" >> $PROJECT_DIR/project.godot
          echo "[application]" >> $PROJECT_DIR/project.godot
          echo 'run/main_scene="res://mocap_main.tscn"' >> $PROJECT_DIR/project.godot
          
          echo "[editor_plugins]" >> $PROJECT_DIR/project.godot
          echo 'enabled=PackedStringArray("res://addons/GDMP/plugin.cfg")' >> $PROJECT_DIR/project.godot
          
          # 2. CRIAR PRESET PERFEITO (Com caminhos absolutos e Gradle ativado)
          echo "Gerando export_presets.cfg definitivo..."
          rm -f $PROJECT_DIR/export_presets.cfg
          cat << 'EOF' > $PROJECT_DIR/export_presets.cfg
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="export_build/mocap.apk"
          
          [preset.0.options]
          gradle_build/use_gradle_build=true
          permissions/camera=true
          architectures/arm64-v8a=true
          package/unique_name="com.anderson.mocap"
          package/name="MocapApp"
          package/signed=true
          keystore/debug="/home/runner/.android/debug.keystore"
          keystore/debug_user="android"
          keystore/debug_password="android"
          EOF
          
          # 3. Recriar a pasta "android" do zero
          mkdir -p $PROJECT_DIR/android/build
          unzip /home/runner/.local/share/godot/export_templates/4.4.stable/android_source.zip -d $PROJECT_DIR/android/build/
          
          # 4. Baixa a IA do MediaPipe
          wget https://github.com/j20001970/GDMP/releases/download/v0.6/GDMP-v0.6.zip -O plugin.zip
          unzip plugin.zip -d temp_plugin
          mkdir -p $PROJECT_DIR/addons
          cp -r temp_plugin/addons/* $PROJECT_DIR/addons/
          
          # 5. Configurar rotas do Android SDK com caminhos de ferro absolutos
          mkdir -p "/home/runner/.config/godot"
          cat << 'EOF' > /home/runner/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_keystore_user = "android"
          export/android/debug_keystore_pass = "android"
          EOF
          
          # 6. Compila o projeto limpo
          cd $PROJECT_DIR
          mkdir -p export_build
          xvfb-run -a godot --headless --rendering-driver opengl3 --editor --quit || true
          xvfb-run -a godot --headless --rendering-driver opengl3 --export-debug "Android" export_build/mocap.apk
          
      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: Aplicativo-Mocap-Final
          path: "**/export_build/mocap.apk"
