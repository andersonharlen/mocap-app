name: Compilar Godot APK com IA Externa
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar o seu código
        uses: actions/checkout@v4
      
      - name: Preparar Java (Para Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Instalar Dependências Virtuais
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers libvulkan1 xvfb
          
      - name: Criar Chave Android (Keystore)
        run: |
          mkdir -p ~/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore ~/.android/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12
          
      - name: Instalar Godot 4.2.2 (Versão Real)
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip Godot_v4.2.2-stable_linux.x86_64.zip
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          
      - name: Instalar Templates de Exportação
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable/
          unzip Godot_v4.2.2-stable_export_templates.tpz -d temp/
          mv temp/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/
          
      - name: Montar Projeto, Recriar Android e Injetar IA
        env:
          ANDROID_KEYSTORE_DEBUG_PATH: ~/.android/debug.keystore
          ANDROID_KEYSTORE_DEBUG_USER: android
          ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          # 1. Extrai o seu projeto pelo nome exato
          unzip inse-prototipo.zip -d projeto
          PROJECT_DIR=$(dirname $(find projeto -name "project.godot" | head -n 1))
          
          # 2. Recriar a pasta "android" do zero para o Gradle funcionar!
          echo "Recriando pasta de build do Android..."
          mkdir -p $PROJECT_DIR/android/build
          unzip ~/.local/share/godot/export_templates/4.2.2.stable/android_source.zip -d $PROJECT_DIR/android/build/
          
          # 3. Baixa a IA do MediaPipe
          wget https://github.com/j20001970/GDMP/releases/download/v0.6.0/gdmp-v0.6.0-android.zip -O plugin.zip
          unzip plugin.zip -d temp_plugin
          mkdir -p $PROJECT_DIR/addons
          cp -r temp_plugin/addons/* $PROJECT_DIR/addons/
          
          # 4. Configurar as rotas pro Godot achar o Android SDK no servidor
          export EDITOR_SETTINGS="~/.config/godot/editor_settings-4.tres"
          mkdir -p ~/.config/godot
          echo "[gd_resource type=\"EditorSettings\" format=3]" > $EDITOR_SETTINGS
          echo "[resource]" >> $EDITOR_SETTINGS
          echo "export/android/android_sdk_path = \"$ANDROID_SDK_ROOT\"" >> $EDITOR_SETTINGS
          echo "export/android/debug_keystore = \"~/.android/debug.keystore\"" >> $EDITOR_SETTINGS
          echo "export/android/debug_keystore_user = \"android\"" >> $EDITOR_SETTINGS
          echo "export/android/debug_keystore_pass = \"android\"" >> $EDITOR_SETTINGS
          
          # 5. Compila o projeto (com motor gráfico blindado)
          cd $PROJECT_DIR
          mkdir -p export_build
          xvfb-run godot --headless --rendering-driver opengl3 --editor --quit || true
          xvfb-run godot --headless --rendering-driver opengl3 --export-debug "Android" export_build/mocap.apk
          
      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: Aplicativo-Mocap-Final
          path: "**/export_build/mocap.apk"
